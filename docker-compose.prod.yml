version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: fasocare_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_files:/var/www/static:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - fasocare_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fasocare_frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.fasocare.gov.bf/api/v1
    volumes:
      - static_files:/app/.next/static
    restart: unless-stopped
    networks:
      - fasocare_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fasocare_backend
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      - DB_SSL=true
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_EXPIRATION=15m
      - JWT_REFRESH_EXPIRATION=7d
      - RATE_LIMIT_TTL=60000
      - RATE_LIMIT_MAX=100
      - AT_USERNAME=${AT_USERNAME}
      - AT_API_KEY=${AT_API_KEY}
      - AT_SMS_FROM=${AT_SMS_FROM}
      - ENABLE_SMS_NOTIFICATIONS=true
      - LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fasocare_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  postgres:
    image: postgres:15-alpine
    container_name: fasocare_postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fasocare_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: fasocare_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - fasocare_network

  # Background job worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: fasocare_worker
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      - REDIS_URL=redis://redis:6379
      - AT_USERNAME=${AT_USERNAME}
      - AT_API_KEY=${AT_API_KEY}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - fasocare_network

  # Database backup service
  backup:
    image: postgres:15-alpine
    container_name: fasocare_backup
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    command: >
      sh -c "echo '0 2 * * * /backup.sh' | crontab - && crond -f"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - fasocare_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_files:
    driver: local

networks:
  fasocare_network:
    driver: bridge
